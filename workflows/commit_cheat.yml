name: Auto commit

on:

  push:
    branches:
      - master
      
  schedule:
  - cron: "0 22,23 * * *" # See https://crontab.guru/#0_7,9,11,17,20_*_*_*

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2      
        with:
         persist-credentials: false
         fetch-depth: 0

      - name: Modify last update
        run: |
          d=`date '+%Y-%m-%dT%H:%M:%SZ'`
          echo $d > LAST_UPDATED
          
      - name: Commit changes
        run: |
          set -o pipefail
          git config --global --add safe.directory /github/workspace
          git config --local user.email "rakkaevandra@gmail.com"
          git config --local user.name "RakkaEvandra06"
          git config --global --add safe.directory /github/workspace
          git add -A
          
          arr[0]="chore(bot): 🥶 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 🥵 auto commit"
          arr[3]="chore(bot): 🗿 auto commit"
          arr[4]="chore(bot): 👻 auto commit"
          
          rand=$[$RANDOM % ${#arr[@]}]
          
          git commit -m "${arr[$rand]}"
          
      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          force: true
          directory: "."
          github_token: ${{ secrets.GITHUB_TOKEN }}
