name: Auto commit

on:
  push:
    branches:
      - master

  schedule:
    - cron: "0 22,23 * * *"

permissions:
  contents: write

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # keep credentials so push works
          persist-credentials: true

      - name: Modify last update
        run: |
          date -u '+%Y-%m-%dT%H:%M:%SZ' > LAST_UPDATED

      - name: Commit changes
        run: |
          set -o pipefail

          git config user.email "rakkaevandra@gmail.com"
          git config user.name "RakkaEvandra06"

          git add -A

          arr[0]="chore(bot): 🥶 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 🥵 auto commit"
          arr[3]="chore(bot): 🗿 auto commit"
          arr[4]="chore(bot): 👻 auto commit"

          rand=$((RANDOM % ${#arr[@]}))

          # avoid failure if nothing to commit
          git diff --cached --quiet || git commit -m "${arr[$rand]}"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true